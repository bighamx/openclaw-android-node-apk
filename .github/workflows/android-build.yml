name: Android Build

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/android/**'
      - 'apps/shared/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Android Signing Secrets
        run: |
          missing=0
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: $secret_name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Android release build requires signing secrets configured in this fork repository."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/android/app/keystore.jks

      - name: Setup Gradle Properties
        run: |
          mkdir -p ~/.gradle
          echo "OPENCLAW_ANDROID_STORE_FILE=${GITHUB_WORKSPACE}/apps/android/app/keystore.jks" >> ~/.gradle/gradle.properties
          echo "OPENCLAW_ANDROID_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> ~/.gradle/gradle.properties
          echo "OPENCLAW_ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> ~/.gradle/gradle.properties
          echo "OPENCLAW_ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: Build with Gradle
        working-directory: ./apps/android
        run: ./gradlew :app:assembleRelease --parallel --build-cache --configure-on-demand --no-daemon

      - name: Rename APK for Release
        run: |
          mkdir -p apps/android/app/build/outputs/apk/release
          # Prefer thirdParty flavor for the latest release artifact
          if ls apps/android/app/build/outputs/apk/thirdParty/release/*.apk 1> /dev/null 2>&1; then
            cp apps/android/app/build/outputs/apk/thirdParty/release/*.apk apps/android/app/build/outputs/apk/release/openclaw-android-latest.apk
          else
            cp apps/android/app/build/outputs/apk/*/release/*.apk apps/android/app/build/outputs/apk/release/openclaw-android-latest.apk
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/release/openclaw-android-latest.apk

      - name: Generate Build Variables
        id: vars
        run: |
          echo "tag_date=$(TZ='Asia/Shanghai' date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "display_date=$(TZ='Asia/Shanghai' date +'%Y.%m.%d %H:%M') UTC+8" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "apk-${{ steps.vars.outputs.tag_date }}-${{ steps.vars.outputs.short_sha }}"
          name: "Android APK - ${{ steps.vars.outputs.display_date }}"
          files: apps/android/app/build/outputs/apk/release/openclaw-android-latest.apk
          body: "Automated Android Signed Release APK from commit ${{ github.sha }}"
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
